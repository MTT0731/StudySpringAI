<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DeepSeek Chat Demo</title>
    <style>
        :root{--bg:#0f1724;--card:#0b1220;--muted:#94a3b8;--accent:#60a5fa;--user:#7c3aed}
        body{margin:0;font-family:Inter,ui-sans-serif,system-ui,Segoe UI,Roboto,"Helvetica Neue",Arial;background:linear-gradient(180deg,#071028 0%, #081325 100%);color:#e6eef8;min-height:100vh;display:flex;align-items:center;justify-content:center}
        .container{width:100%;max-width:760px;padding:24px}
        .card{background:rgba(255,255,255,0.03);border-radius:12px;padding:18px;box-shadow:0 6px 18px rgba(2,6,23,0.6)}
        header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
        h1{font-size:18px;margin:0}
        .chat{height:420px;overflow:auto;padding:12px;border-radius:8px;background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);margin-bottom:12px}
        .message{padding:10px 14px;border-radius:10px;margin-bottom:10px;max-width:82%}
        .msg-user{background:linear-gradient(90deg,var(--user),#5b21b6);margin-left:auto;text-align:right}
        .msg-bot{background:linear-gradient(90deg,#02203a,#08304a);text-align:left}
        .meta{font-size:12px;color:var(--muted);margin-bottom:8px}
        .controls{display:flex;gap:8px}
        input[type="text"]{flex:1;padding:10px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:inherit}
        button{padding:10px 14px;border-radius:8px;border:none;background:var(--accent);color:#04233a;font-weight:600;cursor:pointer}
        button:disabled{opacity:0.6;cursor:not-allowed}
        .status{font-size:13px;color:var(--muted);margin-top:8px}
        .error{color:#ff8a80}
        @media (max-width:560px){.chat{height:60vh}}
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <header>
            <h1>DeepSeek Chat 示例</h1>
            <div style="flex:1"></div>
            <div class="meta">通过后端调用 DeepSeek，后端返回纯文本响应</div>
        </header>

        <div id="chat" class="chat" aria-live="polite"></div>

        <div class="controls">
            <input id="messageInput" type="text" placeholder="输入消息，按 Enter 发送" />
            <button id="sendBtn">发送</button>
        </div>
        <div id="status" class="status"></div>
    </div>
    <p style="color:var(--muted);font-size:13px;margin-top:10px">注意：此页面通过 GET 请求调用 <code>/api/chat/message?message=...</code></p>
</div>

<script>
    const input = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const chat = document.getElementById('chat');
    const status = document.getElementById('status');

    function appendMessage(text, kind='bot'){
        const wrap = document.createElement('div');
        wrap.className = 'message ' + (kind === 'user' ? 'msg-user' : 'msg-bot');
        wrap.textContent = text;
        chat.appendChild(wrap);
        chat.scrollTop = chat.scrollHeight - chat.clientHeight + 100;
    }

    let currentEventSource = null;

    function startStream(msg) {
        // Close existing stream if any
        if (currentEventSource) {
            try { currentEventSource.close(); } catch (e) {}
            currentEventSource = null;
        }

        const encoded = encodeURIComponent(msg);
        const es = new EventSource(`/api/chat/stream?message=${encoded}`);
        currentEventSource = es;

        // Create a bot message placeholder
        const botWrap = document.createElement('div');
        botWrap.className = 'message msg-bot';
        botWrap.textContent = '';
        chat.appendChild(botWrap);
        chat.scrollTop = chat.scrollHeight - chat.clientHeight + 100;

        status.textContent = '正在接收流式回复...';
        status.classList.remove('error');

        es.onmessage = function(e) {
            // default message events — append data
            if (!e.data) return;
            botWrap.textContent += e.data;
            chat.scrollTop = chat.scrollHeight - chat.clientHeight + 100;
        };

        es.addEventListener('done', function() {
            status.textContent = '回复完成';
            try { es.close(); } catch (e) {}
            currentEventSource = null;
            input.disabled = false;
            sendBtn.disabled = false;
            input.focus();
        });

        es.onerror = function(err) {
            status.textContent = '流式连接出错';
            status.classList.add('error');
            try { es.close(); } catch (e) {}
            currentEventSource = null;
            input.disabled = false;
            sendBtn.disabled = false;
        };
    }

    function sendMessage(){
        const msg = input.value.trim();
        if(!msg) return;
        appendMessage(msg, 'user');
        input.value = '';
        input.disabled = true;
        sendBtn.disabled = true;
        // start SSE stream
        startStream(msg);
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') sendMessage(); });

    // Focus on load
    input.focus();
    // Small welcome message
    appendMessage('欢迎使用 DeepSeek Chat 示例。输入问题并发送。', 'bot');
</script>

</body>
</html>
